name: sillytavern_app
description: SillyTavern Native — standalone AI companion with VRM characters.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # VRM rendering (WebGL via native WebView)
  flutter_inappwebview: ^6.0.0

  # AI API — direct calls, no server needed
  http: ^1.2.0
  dio: ^5.4.3+1

  # State management
  flutter_riverpod: ^2.5.1

  # Secure local storage (API keys)
  flutter_secure_storage: ^9.0.0

  # Persistent preferences
  shared_preferences: ^2.2.3

  # Local database for chat history
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File system
  path_provider: ^2.1.4
  file_picker: ^8.0.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2

  # TTS — character voice
  flutter_tts: ^4.0.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/html/
    - assets/characters/
