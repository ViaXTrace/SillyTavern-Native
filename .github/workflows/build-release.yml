name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sillytavern-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Debug build (no signing needed) ──────────────────────────────────────
      - name: Build debug APK
        if: github.event.inputs.release_type == 'debug' || github.event_name == 'workflow_dispatch'
        run: flutter build apk --debug --no-shrink
        env:
          FLUTTER_TARGET: lib/main.dart

      # ── Release build (signed) ────────────────────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
        shell: bash

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/sillytavern-app/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB (Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/sillytavern-app/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload debug APK artifact
        if: github.event.inputs.release_type == 'debug' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sillytavern-debug.apk
          path: sillytavern-app/build/app/outputs/apk/debug/app-debug.apk

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sillytavern-release.apk
          path: sillytavern-app/build/app/outputs/apk/release/app-release.apk

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SillyTavern Native ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## SillyTavern Native ${{ steps.version.outputs.VERSION }}

            ### What's included
            - Native Flutter UI with AIRI-inspired dark design
            - VRM 3D character rendering (Three.js + @pixiv/three-vrm)
            - Direct AI API support: OpenAI, Claude, Gemini, Ollama, OpenRouter
            - No backend server required — 100% standalone
            - Character card system (compatible with SillyTavern format)
            - Secure API key storage (device keychain)
            - Markdown chat rendering
            - Animated typing indicator

            ### Installation
            Download `sillytavern-release.apk` and install on Android 6.0+.
            Enable "Install from unknown sources" in your device settings.

            ### First launch
            1. Select your AI provider
            2. Enter your API key (stored securely on device)
            3. Add characters from the Characters tab
            4. Start chatting!
          files: |
            sillytavern-app/build/app/outputs/apk/release/app-release.apk
            sillytavern-app/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
