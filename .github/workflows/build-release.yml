name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Debug build (no signing needed) ───────────────────────────────────────
      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --debug

      # ── Release build (signed) ────────────────────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB (Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Upload artifacts ───────────────────────────────────────────────────────
      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sillytavern-debug.apk
          path: build/app/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sillytavern-release.apk
          path: build/app/outputs/apk/release/app-release.apk

      # ── GitHub Release ─────────────────────────────────────────────────────────
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SillyTavern Native ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## SillyTavern Native ${{ steps.version.outputs.VERSION }}

            ### What's included
            - Native Flutter UI with AIRI-inspired dark design
            - VRM 3D character rendering (Three.js + @pixiv/three-vrm)
            - Direct AI API — OpenAI, Claude, Gemini, Ollama, OpenRouter (no server needed)
            - Character voice via TTS (pitch, speed, language controls)
            - Character card system (SillyTavern JSON format compatible)
            - Secure API key storage (device keychain)
            - Markdown chat rendering with animated typing indicator

            ### Installation
            Download `app-release.apk` → install on Android 6.0+.
            Enable "Install from unknown sources" in device settings.
          files: |
            build/app/outputs/apk/release/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
